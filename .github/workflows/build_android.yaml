name: CI

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

defaults:
  run:
    working-directory: ./Android/src

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Android lint
        run: ./gradlew lint --build-cache
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: Android/src/app/build/reports/lint-results*

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run unit tests
        run: ./gradlew test --continue --build-cache
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Android/src/app/build/reports/tests/

  build:
    name: Build (signed)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          mkdir -p Android/src/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > Android/src/keystore/release.keystore
        shell: bash

      - name: Assemble release (signed)
        run: ./gradlew assembleRelease --build-cache
        env:
          KEYSTORE_PATH: Android/src/keystore/release.keystore

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-apk
          path: Android/src/app/build/outputs/apk/
