name: CI

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Android/**'
      - '.github/workflows/**'
  push:
    branches: [ "main" ]
    paths:
      - 'Android/**'
      - '.github/workflows/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: ./Android/src

env:
  GRADLE_OPTS: -Dorg.gradle.parallel=true -Dorg.gradle.daemon=true -Dorg.gradle.jvmargs="-Xmx4g -Xms2g -XX:MaxMetaspaceSize=512m"
  GRADLE_USER_HOME: ~/.gradle

jobs:
  lint:
    name: Lint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Run Android lint
        run: ./gradlew lint --build-cache
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: Android/src/app/build/reports/lint-results*

  unit-tests:
    name: Unit Tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Run unit tests
        run: ./gradlew test --continue --build-cache
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: Android/src/app/build/reports/tests/

  build:
    name: Build (signed)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    permissions:
      contents: read
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/release.keystore
        shell: bash

      - name: Assemble release (signed)
        run: ./gradlew assembleRelease --build-cache
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/Android/src/keystore/release.keystore

      - name: Upload signed APK
        uses: actions/upload-artifact@v7
        with:
          name: signed-apk
          path: Android/src/app/build/outputs/apk/

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: signed-apk
      - name: Extract version name
        run: |
          VERSION=$(grep 'versionName' Android/src/app/build.gradle.kts \
            | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=$(find . -name "app-universal-release.apk" -type f)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" -type f | head -1)
          fi
          echo "Found APK: $APK"
          gh release create "v${{ env.VERSION }}" \
            --repo "${{ github.repository }}" \
            --title "Release v${{ env.VERSION }}" \
            --generate-notes \
            "$APK"
