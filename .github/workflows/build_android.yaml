name: CI

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Android/**'
      - '.github/workflows/**'
  push:
    branches: [ "main" ]
    paths:
      - 'Android/**'
      - '.github/workflows/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: ./Android/src

jobs:
  # ── Informational checks ──────────────────────────────────
  # Lint runs in parallel with everything else, but does NOT
  # block merging. Results are visible in the PR checks tab.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Run Android lint
        run: ./gradlew lint
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: Android/src/app/build/reports/lint-results*

  # ── Required checks ───────────────────────────────────────
  # These must pass before the PR can be merged.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Run unit tests
        run: ./gradlew test --continue
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Android/src/app/build/reports/tests/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Assemble release
        run: ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: Android/src/app/build/outputs/apk/
