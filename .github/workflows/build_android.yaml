name: CI

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Android/**'
      - '.github/workflows/**'
  push:
    branches: [ "main" ]
    paths:
      - 'Android/**'
      - '.github/workflows/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: ./Android/src

jobs:
  # ── Combined lint + unit tests ─────────────────────────────
  # Lint depends on compilation, so running it in the same job
  # as tests avoids compiling the entire project twice.
  # Lint results are visible in the PR checks tab (informational).
  lint-and-tests:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run lint
        run: ./gradlew lint --build-cache
      - name: Run unit tests
        run: ./gradlew test --continue --build-cache
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: Android/src/app/build/reports/lint-results*
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Android/src/app/build/reports/tests/

  # ── Required build check ──────────────────────────────────
  # Must pass before the PR can be merged.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-tests]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble release
        run: ./gradlew assembleRelease --build-cache
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: Android/src/app/build/outputs/apk/
